services:
  db:
    image: postgres:16
    container_name: ml_hub_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: ml_hub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    container_name: ml_hub_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
